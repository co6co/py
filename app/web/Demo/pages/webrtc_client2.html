<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 视频流客户端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #4ecdc4; }
        
        .video-container { 
            background: #16213e; 
            border-radius: 10px; 
            padding: 20px; 
            margin-bottom: 20px;
        }
        .video-container h3 { margin-bottom: 15px; color: #4ecdc4; }
        video { 
            width: 100%; 
            max-height: 500px; 
            background: #000; 
            border-radius: 8px;
            display: block;
        }
        
        .control-panel { 
            background: #16213e; 
            border-radius: 10px; 
            padding: 20px; 
            margin-bottom: 20px;
        }
        .control-panel h3 { margin-bottom: 20px; color: #4ecdc4; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-connect { background: #4ecdc4; color: #1a1a2e; }
        .btn-connect:hover:not(:disabled) { background: #45b7aa; }
        .btn-subscribe { background: #f38181; color: #fff; }
        .btn-subscribe:hover:not(:disabled) { background: #e06868; }
        .btn-disconnect { background: #95a5a6; color: #fff; }
        .btn-disconnect:hover:not(:disabled) { background: #7f8c8d; }
        
        .rtsp-config {
            margin-bottom: 20px;
            padding: 15px;
            background: #0f3460;
            border-radius: 8px;
        }
        .rtsp-config label { display: block; margin-bottom: 5px; color: #4ecdc4; }
        .rtsp-config input {
            width: 100%;
            padding: 10px;
            border: 1px solid #4ecdc4;
            border-radius: 5px;
            background: #1a1a2e;
            color: #fff;
            font-family: monospace;
        }
        
        .streams-list { background: #16213e; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .streams-list h3 { margin-bottom: 15px; color: #4ecdc4; }
        #streamsList { list-style: none; }
        #streamsList li { 
            padding: 15px; 
            background: #0f3460; 
            border-radius: 8px; 
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #streamsList li:hover { background: #1a5276; }
        #streamsList li:last-child { margin-bottom: 0; }
        #streamsList li.selected { border: 2px solid #4ecdc4; }
        .stream-info span { display: block; }
        .stream-id { font-weight: bold; color: #4ecdc4; }
        .stream-meta { font-size: 12px; color: #95a5a6; }
        
        .log-panel { 
            background: #0f3460; 
            border-radius: 10px; 
            padding: 15px; 
            height: 200px; 
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .log-panel h3 { margin-bottom: 10px; color: #4ecdc4; }
        .log-entry { margin-bottom: 5px; }
        .log-info { color: #95a5a6; }
        .log-success { color: #4ecdc4; }
        .log-error { color: #f38181; }
        .log-warning { color: #f9ca24; }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-item {
            padding: 10px 15px;
            background: #16213e;
            border-radius: 5px;
        }
        .status-item label { color: #95a5a6; font-size: 12px; }
        .status-item span { color: #4ecdc4; font-weight: bold; }
        
        @media (max-width: 768px) {
            .btn-group { flex-direction: column; }
            button { width: 100%; }
            .status-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WebRTC 视频流客户端</h1>
        
        <div class="status-bar">
            <div class="status-item">
                <label>连接状态:</label>
                <span id="connectionStatus">未连接</span>
            </div>
            <div class="status-item">
                <label>ICE 状态:</label>
                <span id="iceStatus">-</span>
            </div>
            <div class="status-item">
                <label>Peer ID:</label>
                <span id="peerId">-</span>
            </div>
        </div>

        <div class="control-panel">
            <h3>控制</h3>
            
            <div class="rtsp-config">
                <label>RTSP URL (可选)</label>
                <input type="text" id="rtspUrl" placeholder="rtsp://username:password@ip:port/stream" 
                       value="rtsp://admin:123456@192.168.1.100:554/Streaming/Channels/101">
                <button id="startRtspBtn" class="btn-subscribe" style="margin-top: 10px;">发布 RTSP 流</button>
            </div>
            
            <div class="btn-group">
                <button id="connectBtn" class="btn-connect">连接服务器</button>
                <button id="disconnectBtn" class="btn-disconnect" disabled>断开连接</button>
                <button id="subscribeBtn" class="btn-subscribe" disabled>订阅选中流</button>
                <button id="unsubscribeBtn" class="btn-disconnect" disabled>停止订阅</button>
            </div>
        </div>

        <div class="streams-list">
            <h3>可用视频流</h3>
            <ul id="streamsList"></ul>
        </div>

        <div class="video-container">
            <h3>远程视频</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>

        <div class="log-panel">
            <h3>日志</h3>
            <div id="logPanel"></div>
        </div>
    </div>

    <script>
        class WebRTCStreamClient {
            constructor() {
                this.ws = null;
                this.peerConnection = null;
                this.remoteStream = null;
                this.peerId = 'viewer_' + Math.random().toString(36).substr(2, 9);
                this.isConnected = false;
                this.isSubscribing = false;
                this.selectedStream = null;
                this.streams = [];
                this.pendingIceCandidates = [];
                this.serverMode = false;

                this.elements = {
                    connectBtn: document.getElementById('connectBtn'),
                    disconnectBtn: document.getElementById('disconnectBtn'),
                    subscribeBtn: document.getElementById('subscribeBtn'),
                    unsubscribeBtn: document.getElementById('unsubscribeBtn'),
                    startRtspBtn: document.getElementById('startRtspBtn'),
                    rtspUrl: document.getElementById('rtspUrl'),
                    remoteVideo: document.getElementById('remoteVideo'),
                    streamsList: document.getElementById('streamsList'),
                    logPanel: document.getElementById('logPanel'),
                    connectionStatus: document.getElementById('connectionStatus'),
                    iceStatus: document.getElementById('iceStatus'),
                    peerId: document.getElementById('peerId')
                };

                this.bindEvents();
            }

            bindEvents() {
                this.elements.connectBtn.addEventListener('click', () => this.connect());
                this.elements.disconnectBtn.addEventListener('click', () => this.disconnect());
                this.elements.subscribeBtn.addEventListener('click', () => this.subscribeStream());
                this.elements.unsubscribeBtn.addEventListener('click', () => this.unsubscribeStream());
                this.elements.startRtspBtn.addEventListener('click', () => this.startRtspStream());
            }

            async connect() {
                try {
                    this.log('正在连接到服务器...', 'info');
                    const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
                    const url = `${protocol}://${window.location.host}/ws`;
                    this.ws = new WebSocket(url);

                    this.ws.onopen = () => {
                        this.isConnected = true;
                        this.elements.connectionStatus.textContent = '已连接';
                        this.elements.connectionStatus.style.color = '#4ecdc4';
                        this.elements.peerId.textContent = this.peerId;
                        this.log('连接成功', 'success');
                        this.send({ type: 'register', peerId: this.peerId });
                        this.updateUI();
                    };

                    this.ws.onmessage = (event) => {
                        const message = JSON.parse(event.data);
                        this.handleMessage(message);
                    };

                    this.ws.onerror = (error) => {
                        this.log('连接错误: ' + error.message, 'error');
                        this.elements.connectionStatus.textContent = '连接错误';
                        this.elements.connectionStatus.style.color = '#f38181';
                    };

                    this.ws.onclose = () => {
                        this.isConnected = false;
                        this.isSubscribing = false;
                        this.serverMode = false;
                        this.elements.connectionStatus.textContent = '未连接';
                        this.elements.connectionStatus.style.color = '#95a5a6';
                        this.log('连接已关闭', 'warning');
                        this.updateUI();
                        this.cleanup();
                    };
                } catch (error) {
                    this.log('连接失败: ' + error.message, 'error');
                }
            }

            disconnect() {
                if (this.ws) {
                    this.ws.close();
                }
                this.isConnected = false;
                this.updateUI();
            }

            send(message) {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    this.ws.send(JSON.stringify(message));
                }
            }

            async handleMessage(message) {
                switch (message.type) {
                    case 'registered':
                        this.log('已注册', 'success');
                        break;
                    case 'publish-success':
                        this.log('流发布成功: ' + message.streamId, 'success');
                        break;
                    case 'subscribe-success':
                        this.log('订阅成功', 'success');
                        break;
                    case 'rtsp-started':
                        this.log('RTSP 流已启动: ' + message.streamId, 'success');
                        break;
                    case 'new-subscriber':
                        this.log('新订阅者: ' + message.from, 'info');
                        this.createOfferForSubscriber(message.from, message.streamId);
                        break;
                    case 'streams-update':
                        this.streams = message.streams;
                        this.updateStreamsList();
                        break;
                    case 'offer':
                        await this.handleOffer(message);
                        break;
                    case 'answer':
                        await this.handleAnswer(message);
                        break;
                    case 'ice-candidate':
                        await this.handleIceCandidate(message);
                        break;
                    case 'error':
                        this.log('错误: ' + message.message, 'error');
                        break;
                }
            }

            async startRtspStream() {
                if (!this.isConnected) {
                    this.log('请先连接服务器', 'warning');
                    return;
                }

                const rtspUrl = this.elements.rtspUrl.value.trim();
                if (!rtspUrl) {
                    this.log('请输入 RTSP URL', 'warning');
                    return;
                }

                try {
                    this.log('正在发布 RTSP 流...', 'info');
                    this.send({
                        type: 'start-rtsp',
                        from: this.peerId,
                        rtspUrl: rtspUrl
                    });
                } catch (error) {
                    this.log('发布失败: ' + error.message, 'error');
                }
            }

            updateStreamsList() {
                this.elements.streamsList.innerHTML = '';
                
                if (this.streams.length === 0) {
                    const li = document.createElement('li');
                    li.textContent = '暂无可用视频流';
                    li.style.cursor = 'default';
                    li.style.background = '#1a1a2e';
                    this.elements.streamsList.appendChild(li);
                    return;
                }

                this.streams.forEach(stream => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="stream-info">
                            <span class="stream-id">${stream.streamId}</span>
                            <span class="stream-meta">发布者: ${stream.publisher}</span>
                            <span class="stream-meta">类型: ${stream.type || 'unknown'} | 订阅者: ${stream.subscribers} 人</span>
                        </div>
                    `;
                    li.addEventListener('click', () => this.selectStream(stream));
                    
                    if (this.selectedStream && this.selectedStream.streamId === stream.streamId) {
                        li.classList.add('selected');
                    }
                    
                    this.elements.streamsList.appendChild(li);
                });

                this.elements.subscribeBtn.disabled = !this.selectedStream || this.isSubscribing;
            }

            selectStream(stream) {
                this.selectedStream = stream;
                this.updateStreamsList();
            }

            async subscribeStream() {
                if (!this.selectedStream || !this.isConnected) return;
                
                try {
                    this.log('正在订阅视频流: ' + this.selectedStream.streamId, 'info');
                    this.send({
                        type: 'subscribe',
                        from: this.peerId,
                        streamId: this.selectedStream.streamId,
                        publisher: this.selectedStream.publisher
                    });
                    
                    this.isSubscribing = true;
                    this.updateUI();
                } catch (error) {
                    this.log('订阅失败: ' + error.message, 'error');
                }
            }

            async unsubscribeStream() {
                try {
                    if (this.peerConnection) {
                        this.peerConnection.close();
                        this.peerConnection = null;
                    }
                    if (this.remoteStream) {
                        this.remoteStream.getTracks().forEach(track => track.stop());
                        this.remoteStream = null;
                    }
                    this.elements.remoteVideo.srcObject = null;
                    this.isSubscribing = false;
                    this.serverMode = false;
                    this.selectedStream = null;
                    this.updateUI();
                    this.updateStreamsList();
                    this.log('已停止订阅', 'info');
                } catch (error) {
                    this.log('停止订阅失败: ' + error.message, 'error');
                }
            }

            createPeerConnection() {
                this.peerConnection = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                });

                this.setupPeerConnectionListeners();
            }

            setupPeerConnectionListeners() {
                this.peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        const target = this.serverMode ? 'server' : (this.selectedStream ? this.selectedStream.publisher : null);
                        this.send({
                            type: 'ice-candidate',
                            from: this.peerId,
                            to: target,
                            candidate: event.candidate
                        });
                    }
                };

                this.peerConnection.oniceconnectionstatechange = () => {
                    const state = this.peerConnection.iceConnectionState;
                    this.elements.iceStatus.textContent = state;
                    
                    if (state === 'connected' || state === 'completed') {
                        this.elements.iceStatus.style.color = '#4ecdc4';
                        this.log('P2P 连接已建立', 'success');
                    } else if (state === 'failed' || state === 'disconnected') {
                        this.elements.iceStatus.style.color = '#f38181';
                        this.log('连接失败', 'error');
                    } else {
                        this.elements.iceStatus.style.color = '#f9ca24';
                    }
                };

                this.peerConnection.ontrack = (event) => {
                    this.log('收到远程轨道', 'success');
                    this.remoteStream = event.streams[0];
                    this.elements.remoteVideo.srcObject = this.remoteStream;
                };
            }

            async createOfferForSubscriber(subscriberId, streamId) {
                try {
                    this.log('为订阅者创建 Offer: ' + subscriberId, 'info');
                    
                    this.createPeerConnection();
                    
                    const offer = await this.peerConnection.createOffer();
                    await this.peerConnection.setLocalDescription(offer);

                    this.send({
                        type: 'offer',
                        from: this.peerId,
                        to: subscriberId,
                        sdp: offer.sdp,
                        streamId: streamId
                    });
                } catch (error) {
                    this.log('创建 Offer 失败: ' + error.message, 'error');
                }
            }

            async handleOffer(message) {
                try {
                    this.log('收到 Offer', 'info');
                    
                    if (message.from === 'server') {
                        this.serverMode = true;
                    }
                    
                    if (!this.peerConnection) {
                        this.createPeerConnection();
                    }

                    await this.peerConnection.setRemoteDescription(
                        new RTCSessionDescription({ type: 'offer', sdp: message.sdp })
                    );

                    await this.flushPendingIceCandidates();

                    const answer = await this.peerConnection.createAnswer();
                    await this.peerConnection.setLocalDescription(answer);

                    const target = this.serverMode ? 'server' : message.from;
                    this.send({
                        type: 'answer',
                        from: this.peerId,
                        to: target,
                        sdp: answer.sdp
                    });
                } catch (error) {
                    this.log('处理 Offer 失败: ' + error.message, 'error');
                }
            }

            async handleAnswer(message) {
                try {
                    this.log('收到 Answer', 'info');
                    
                    if (this.peerConnection.signalingState === 'have-local-offer') {
                        await this.peerConnection.setRemoteDescription(
                            new RTCSessionDescription({ type: 'answer', sdp: message.sdp })
                        );
                        await this.flushPendingIceCandidates();
                        this.log('Answer 处理成功', 'success');
                    } else if (this.peerConnection.signalingState === 'stable') {
                        this.log('当前状态为 stable，尝试设置远程描述', 'info');
                        try {
                            await this.peerConnection.setRemoteDescription(
                                new RTCSessionDescription({ type: 'answer', sdp: message.sdp })
                            );
                            await this.flushPendingIceCandidates();
                            this.log('Answer 处理成功', 'success');
                        } catch (e) {
                            this.log('设置远程描述失败: ' + e.message, 'warning');
                        }
                    } else {
                        this.log(`当前状态 ${this.peerConnection.signalingState}，无法设置 answer`, 'warning');
                    }
                } catch (error) {
                    this.log('处理 Answer 失败: ' + error.message, 'error');
                }
            }

            async handleIceCandidate(message) {
                if (this.peerConnection) {
                    try {
                        if (this.peerConnection.remoteDescription) {
                            await this.peerConnection.addIceCandidate(
                                new RTCIceCandidate(message.candidate)
                            );
                            this.log('添加 ICE 候选成功', 'info');
                        } else {
                            this.pendingIceCandidates.push(message.candidate);
                            this.log('ICE 候选已缓存', 'info');
                        }
                    } catch (error) {
                        this.log('添加 ICE 候选失败: ' + error.message, 'error');
                    }
                }
            }

            async flushPendingIceCandidates() {
                while (this.pendingIceCandidates.length > 0) {
                    const candidate = this.pendingIceCandidates.shift();
                    try {
                        await this.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                        this.log('添加缓存的 ICE 候选成功', 'info');
                    } catch (error) {
                        this.log('添加缓存的 ICE 候选失败: ' + error.message, 'error');
                    }
                }
            }

            cleanup() {
                if (this.peerConnection) {
                    this.peerConnection.close();
                    this.peerConnection = null;
                }
                if (this.remoteStream) {
                    this.remoteStream.getTracks().forEach(track => track.stop());
                    this.remoteStream = null;
                }
                this.elements.remoteVideo.srcObject = null;
                this.elements.iceStatus.textContent = '-';
                this.elements.iceStatus.style.color = '#95a5a6';
            }

            updateUI() {
                this.elements.connectBtn.disabled = this.isConnected;
                this.elements.disconnectBtn.disabled = !this.isConnected;
                this.elements.subscribeBtn.disabled = !this.selectedStream || this.isSubscribing || !this.isConnected;
                this.elements.unsubscribeBtn.disabled = !this.isSubscribing;
                this.elements.startRtspBtn.disabled = !this.isConnected;
            }

            log(message, type = 'info') {
                const div = document.createElement('div');
                div.className = 'log-entry log-' + type;
                div.innerHTML = `<span>[${new Date().toLocaleTimeString()}] ${message}</span>`;
                this.elements.logPanel.appendChild(div);
                this.elements.logPanel.scrollTop = this.elements.logPanel.scrollHeight;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new WebRTCStreamClient();
        });
    </script>
</body>
</html>
