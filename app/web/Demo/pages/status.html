<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 服务器状态监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(to right, #4A00E0, #8E2DE2);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status-card h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
        
        .status-running {
            background-color: #28a745;
        }
        
        .status-stopped {
            background-color: #dc3545;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: #4A00E0;
        }
        
        .rooms-section {
            margin-top: 30px;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #495057;
            padding-bottom: 10px;
            border-bottom: 2px solid #4A00E0;
        }
        
        .room-card {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #e9ecef;
        }
        
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .room-id {
            font-size: 1.2rem;
            font-weight: 600;
            color: #212529;
        }
        
        .room-count {
            background-color: #4A00E0;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .peer-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .peer-tag {
            background-color: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
            font-size: 0.9rem;
            color: #495057;
        }
        
        .refresh-btn {
            background: linear-gradient(to right, #4A00E0, #8E2DE2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(74, 0, 224, 0.2);
        }
        
        .timestamp {
            text-align: center;
            color: #6c757d;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
            font-size: 1.2rem;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 WebRTC 服务器状态监控</h1>
            <p>实时监控信令服务器运行状态</p>
        </header>
        
        <div class="content">
            <div id="errorContainer"></div>
            
            <div id="loading" class="loading">
                正在加载服务器状态...
            </div>
            
            <div id="content" style="display: none;">
                <div class="status-card">
                    <h2>
                        <span class="status-indicator status-running" id="statusIndicator"></span>
                        <span id="statusText">运行中</span>
                    </h2>
                    <p id="statusTime"></p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">在线用户数</div>
                        <div class="stat-value" id="clientsCount">0</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">活跃房间数</div>
                        <div class="stat-value" id="roomsCount">0</div>
                    </div>
                </div>
                
                <div class="rooms-section">
                    <h3 class="section-title">房间详情</h3>
                    <div id="roomsContainer"></div>
                </div>
                
                <div style="text-align: center;">
                    <button class="refresh-btn" onclick="loadStatus()">🔄 刷新状态</button>
                    <p class="timestamp" id="lastUpdate"></p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        async function loadStatus() {
            try {
                const response = await fetch('/status');
                if (!response.ok) {
                    throw new Error('服务器响应错误');
                }
                
                const data = await response.json();
                displayStatus(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('errorContainer').innerHTML = '';
                
            } catch (error) {
                showError('加载状态失败：' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayStatus(data) {
            // 更新状态
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (data.status === 'running') {
                statusIndicator.className = 'status-indicator status-running';
                statusText.textContent = '运行中';
            } else {
                statusIndicator.className = 'status-indicator status-stopped';
                statusText.textContent = '已停止';
            }
            
            document.getElementById('statusTime').textContent = 
                '服务器时间：' + new Date(data.timestamp).toLocaleString('zh-CN');
            
            // 更新统计
            document.getElementById('clientsCount').textContent = data.clients_count;
            document.getElementById('roomsCount').textContent = data.rooms_count;
            
            // 更新房间列表
            const roomsContainer = document.getElementById('roomsContainer');
            roomsContainer.innerHTML = '';
            
            if (data.rooms_count === 0) {
                roomsContainer.innerHTML = '<p style="text-align: center; color: #6c757d; padding: 30px;">暂无活跃房间</p>';
            } else {
                for (const [roomId, roomData] of Object.entries(data.rooms)) {
                    const roomCard = document.createElement('div');
                    roomCard.className = 'room-card';
                    
                    const peersHtml = roomData.peers
                        .map(peer => `<span class="peer-tag">👤 ${peer}</span>`)
                        .join('');
                    
                    roomCard.innerHTML = `
                        <div class="room-header">
                            <span class="room-id">📁 ${roomId}</span>
                            <span class="room-count">${roomData.peer_count} 人</span>
                        </div>
                        <div class="peer-list">
                            ${peersHtml}
                        </div>
                    `;
                    
                    roomsContainer.appendChild(roomCard);
                }
            }
            
            // 更新时间
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                '最后更新：' + now.toLocaleTimeString('zh-CN');
        }
        
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `
                <div class="error">
                    <strong>错误:</strong> ${message}
                    <br><br>
                    <small>请确保信令服务器正在运行</small>
                </div>
            `;
        }
        
        // 页面加载时获取状态
        loadStatus();
        
        // 每 5 秒自动刷新
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
