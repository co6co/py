<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1,
        h2,
        h3 {
            color: #2d3436;
            margin-bottom: 15px;
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #0b7dda;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
        }

        .input-group {
            margin: 10px 0;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            margin: 5px 0;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }

        .status-connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            background: #f8f9fa;
            margin: 10px 0;
        }

        .message {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            background: white;
            border-left: 4px solid #2196F3;
        }

        .message-system {
            border-color: #4CAF50;
            background: #e8f5e9;
        }

        .message-error {
            border-color: #f44336;
            background: #ffebee;
        }

        .message-private {
            border-color: #9c27b0;
            background: #f3e5f5;
        }

        .message-admin {
            border-color: #ff9800;
            background: #fff3e0;
        }

        .message-username {
            font-weight: bold;
            color: #2196F3;
        }

        .message-timestamp {
            font-size: 0.8em;
            color: #666;
            margin-left: 10px;
        }

        .message-content {
            margin-top: 5px;
        }

        .user-list {
            list-style: none;
        }

        .user-item {
            padding: 8px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-online {
            color: #4CAF50;
            font-weight: bold;
        }

        .log {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #666;
            padding: 5px;
            border-bottom: 1px solid #eee;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 10px 0;
        }

        .stat-item {
            background: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #2196F3;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .room-controls {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .room-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #2196F3;
            color: white;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 5px;
        }

        .connection-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .dot-connected {
            background: #4CAF50;
        }

        .dot-disconnected {
            background: #f44336;
        }
    </style>
</head>

<body>
    <h1>🔌 WebSocket 示例应用</h1>

    <div class="container">
        <!-- 左侧面板：连接控制 -->
        <div class="panel">
            <h2>🔗 连接控制</h2>

            <div class="input-group">
                <label>服务器地址:</label>
                <input type="text" id="serverUrl" value="ws://localhost:8000/ws">
            </div>

            <div class="input-group">
                <label>用户名:</label>
                <input type="text" id="username" value="用户" placeholder="输入用户名">
            </div>

            <div class="room-controls">
                <input type="text" id="roomId" value="room1" placeholder="房间ID">
                <button class="btn btn-primary" id="joinRoomBtn">加入房间</button>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="connectionStatus">离线</div>
                    <div class="stat-label">连接状态</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pingTime">0ms</div>
                    <div class="stat-label">延迟</div>
                </div>
            </div>

            <button class="btn btn-primary" id="connectBtn">连接</button>
            <button class="btn btn-danger" id="disconnectBtn" disabled>断开</button>

            <div id="statusDisplay" class="status status-disconnected">未连接</div>

            <h3>📊 服务器信息</h3>
            <button class="btn btn-secondary" id="getStatusBtn">获取状态</button>
            <div id="serverInfo"></div>
        </div>

        <!-- 中间面板：消息区域 -->
        <div class="panel">
            <h2>💬 消息中心
                <span id="roomIndicator"></span>
                <span id="userCount" class="room-badge">0 用户</span>
            </h2>

            <div class="messages" id="messageArea">
                <!-- 消息将在这里显示 -->
            </div>

            <div class="input-group">
                <textarea id="messageInput" placeholder="输入消息..." rows="3"></textarea>
            </div>

            <div>
                <button class="btn btn-primary" id="sendBtn" disabled>发送消息</button>
                <button class="btn btn-secondary" id="sendBroadcastBtn" disabled>广播</button>
                <button class="btn" id="clearBtn">清空消息</button>
            </div>

            <h3>🔄 系统命令</h3>
            <div>
                <button class="btn" id="pingBtn" disabled>发送 Ping</button>
                <button class="btn" id="getRoomInfoBtn" disabled>获取房间信息</button>
                <button class="btn btn-danger" id="leaveRoomBtn" disabled>离开房间</button>
            </div>

            <h3>📋 连接日志</h3>
            <div id="connectionLog"
                style="height: 150px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 5px;">
                <!-- 日志将在这里显示 -->
            </div>
        </div>

        <!-- 右侧面板：用户列表 -->
        <div class="panel">
            <h2>👥 在线用户</h2>
            <div id="userListArea">
                <p>加入房间后显示用户列表...</p>
            </div>

            <h3>🔒 私聊</h3>
            <div class="input-group">
                <select id="privateUserSelect" disabled>
                    <option value="">选择用户...</option>
                </select>
                <textarea id="privateMessage" placeholder="私聊消息..." rows="2" disabled></textarea>
                <button class="btn" id="sendPrivateBtn" disabled>发送私聊</button>
            </div>

            <h3>⚙️ 高级功能</h3>
            <div>
                <button class="btn" id="autoConnectBtn">自动重连测试</button>
                <button class="btn" id="stressTestBtn">压力测试</button>
            </div>

            <h3>📈 统计信息</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="messageCount">0</div>
                    <div class="stat-label">消息总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="connectedTime">0s</div>
                    <div class="stat-label">连接时长</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/deomwebsock.js"></script>
</body>

</html>
